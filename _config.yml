content:
  - title: Key Skills
    layout: text
    content: |
      * Programming: Python (NumPy/Pandas), R, and SQL queries (NoSQL adaptable).
      * Platforms: Linux/Unix, HPC clusters, Nextflow pipelines.
      * Analysis: RNA-seq/single-cell (DESeq2/Seurat), workflows, statistical modeling.
      * Domains: Biomedical/pre-clinical research, microbiology/immunology.

  - title: Experience
    layout: list
    content:
      - layout: top
        title: MD Anderson Cancer Center
        sub_title: Research Trainee
        caption: Jun 2025 - Jul 2025
        description: |
          * Applied CIBERSORTx (Signature Matrix creation, Impute Cell Fraction, High-Resolution Mode) and Seurat to analyze whole blood from 12 healthy donors and PBMCs from an NSCLC patient, successfully distinguishing immune cell-type composition between cohorts.

      - layout: top
        title: WEHI (Walter and Eliza Hall Institute of Medical Research)
        sub_title: Research Data Engineer-Intern
        caption: Nov 2024 - Mar 2025
        description: |
          * Designed and optimized data pipelines for high-dimensional datasets, with experience generating synthetic data and managing large-scale sequencing files.
          * Conducted training and mentorship in statistical programming, strengthening team capacity for data-driven analysis.
          * Collaborated across disciplines to build customized analysis workflows, with outcomes transferable to health data analytics.

      - layout: top
        title: UBI Pharma Inc.
        sub_title: Research Associate
        caption: May 2018 - Jul 2019
        description: |
          * Conducted pre-clinical research on a novel drug candidate, designing and executing 8+ experiments.
          * Implemented and managed instrument verification protocols in compliance with GLP/GMP regulations, ensuring 100% calibration accuracy and regulatory adherence.
          * Constructed and delivered SOP training programs, increasing team adherence to regulatory requirements by 80% and reducing procedural errors.
          * Researched and integrated FDA, EMA, and TFDA immunogenicity regulations into analytical workflows, ensuring 100% compliance during regulatory audits.
          * Performed validation studies on an RT-PCR diagnostic kit, revamping assay conditions and confirming 90% accuracy in detecting target sequences.

  - title: Education
    layout: list
    content:
      - layout: top
        border: weak
        title: The University of Melbourne
        sub_title: Master of Science in Bioinformatics
        caption: Feb 2024 - Dec 2025
        quote: >
          Research Project: Quantifying the Differences Between Poly-A Selection and Ribo-Depletion in RNA-Seq
        description: |
          *	Developed and optimized end-to-end Nextflow pipelines (nf-core/rnaseq) using Singularity containers to ensure environment portability and 100% analysis reproducibility.
          *	Managed large-scale genomic data on Spartan HPC by leveraging Slurm job scheduling; implemented asynchronous execution strategies to ensure continuous pipeline processing during local system downtimes.
          *	Engineered efficient resource allocation by profiling FastQ file sizes to predict optimal CPU/RAM requirements, significantly reducing memory-related failures (OOM) and cluster wait times.
          *	Optimized data I/O performance by utilizing high-speed scratch storage for intermediate file processing and implementing automated cleanup scripts to manage long-term storage quotas.
          *	Performed downstream R analysis (DESeq2, rMATS) to identify protocol biases, documenting all modular code on GitHub for institutional knowledge sharing (MSc Research Project: https://github.com/Jaaaacklyn/Jaaaacklyn/tree/main/Research%20Project).

