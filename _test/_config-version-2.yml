# About Section
about_title: Professional Summary
about_content: >
  Scientist with 5+ years of GLP/GMP and academic experience specializing in the design and optimization of biomimetic 3D neuron cell cultures. Combining an MSc in Bioinformatics with R programming skills to analyze complex datasets.

  **Visa Status:** Graduate Visa 485 (expires in April 2028)

  **Awards & Scholarships:**
  - Mentor: In2Science in Semester 1, 2025 (Mentor Award Nominee)
  - Student Housing Bursary
  - Muriel Ramm Science Bursary 2025

content:
  - title: Key Skills
    layout: text
    content: |
      * **Wet-lab techniques:** Animal dissection and in vivo experiments, viral culture and anti-viral titer assays, bacterial culture, cell culture, ELISA, immunofluorescence staining, flow cytometric.
      * **Molecular biology:** DNA/RNA extraction, PCR, qPCR, gel electrophoresis, Western blot, immunoprecipitation, basic assay validation, and iPSCs.
      * **Aseptic technique:** Sterile handling of samples and reagents, prevention of cross-contamination in molecular workflows.
      * **Regulated lab experience:** Work in GLP/GMP laboratory settings, instrument verification, SOP adherence and training.
      * **Data and documentation:** Precise experimental record-keeping, tracking samples and QC metrics, basic analysis in R/Python.
      * **Professional skills:** Detail-oriented, reliable with scheduled shifts, strong teamwork and communication in fast-paced lab environments.

  - title: Experience
    layout: list
    content:
      - layout: top
        border: weak
        title: MD Anderson Cancer Center
        sub_title: Research Trainee
        caption: Jun 2025 - Jul 2025
        description: >
          Implemented deconvolution and single-cell modelling pipelines for large-scale datasets, using advanced computational and statistical methods to quantify variability in heterogeneous systems and strengthen high-dimensional data analysis skills.

      - layout: top
        title: WEHI (Walter and Eliza Hall Institute of Medical Research)
        sub_title: Research Data Engineer-Intern
        caption: Nov 2024 - Mar 2025
        description: >
          Designed and optimised data pipelines for high-dimensional, large-scale sequencing datasets, while training researchers in statistical programming and collaborating across disciplines to build customised, data-driven analysis workflows.

      - layout: top
        title: NTU - Department of Biomedical Engineering
        sub_title: Research Assistant
        caption: Dec 2019 - Mar 2021
        description: >
          Designed and optimised biomimetic 3D neuron cell culture experiments using strict aseptic technique and careful sample handling. Analysed microscopy and viability data in R and ImageJ to adjust experimental conditions and improve cell viability. Trained and mentored junior staff in laboratory techniques, experimental workflows and good documentation practices.

      - layout: top
        title: UBI Pharma Inc.
        sub_title: Research Associate
        caption: May 2018 - Jul 2019
        description: >
          Conducted pre-clinical research on a novel drug candidate, designing and executing 8+ experiments. Implemented and managed instrument verification protocols in compliance with GLP/GMP regulations, ensuring 100% calibration accuracy and regulatory adherence. Constructed and delivered SOP training programs, increasing team adherence to regulatory requirements by 80% and reducing procedural errors. Researched and integrated FDA, EMA, and TFDA immunogenicity regulations into analytical workflows, ensuring 100% compliance during regulatory audits. Performed validation studies on an RT-PCR diagnostic kit, revamping assay conditions and confirming 90% accuracy in detecting target sequences.

  - title: Education
    layout: list
    content:
      - layout: top
        border: weak
        title: The University of Melbourne
        sub_title: Master of Science in Bioinformatics
        caption: Feb 2024 - Dec 2025
        quote: >
          Research Project: Quantifying the Differences Between Poly-A Selection and Ribo-Depletion in RNA-Seq
        description: >
          Master's research project on RNA-seq, using HPC and reproducible pipelines to process large-scale sequencing data, perform differential expression and splicing analyses, and optimize workflows for robust genomic applications.

      - layout: top
        title: National Taiwan University
        sub_title: Master of Science in Microbiology and Immunology
        caption: Sep 2015 - Jan 2018
        quote: >
          Research Project: Research for competitive relationship between ACTN2 and calmodulin to bind NRIP
        description: >
          Investigated how the cardiac protein ACTN2 and calmodulin compete to bind the coactivator NRIP via its IQ domain, using in vitro pull-down and in vivo immunoprecipitation assays to explore their calcium-dependent interactions and functional implications.

